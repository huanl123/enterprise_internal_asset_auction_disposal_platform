<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #6B7280; }
      .layerName { font: 700 18px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .text { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .chip { font: 600 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .box { fill: #FFFFFF; stroke: #111827; stroke-width: 2; }
      .layer { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 2; }
      .accent { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 2; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="700" y="60" class="title" text-anchor="middle">系统总体架构图</text>
  <text x="700" y="88" class="sub" text-anchor="middle">表示层 / 接口层 / 业务层 / 数据层（基于本项目：Vue3 + Spring Boot + MySQL）</text>

  <!-- Layers -->
  <rect x="140" y="130" width="1120" height="150" rx="18" class="layer"/>
  <rect x="140" y="300" width="1120" height="150" rx="18" class="layer"/>
  <rect x="140" y="470" width="1120" height="190" rx="18" class="layer"/>
  <rect x="140" y="680" width="1120" height="170" rx="18" class="layer"/>

  <!-- Layer titles -->
  <rect x="160" y="150" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="179" class="layerName" text-anchor="middle">表示层</text>

  <rect x="160" y="320" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="349" class="layerName" text-anchor="middle">接口层</text>

  <rect x="160" y="490" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="519" class="layerName" text-anchor="middle">业务层</text>

  <rect x="160" y="700" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="729" class="layerName" text-anchor="middle">数据层</text>

  <!-- 表示层内容 -->
  <rect x="380" y="150" width="860" height="110" rx="16" class="box"/>
  <text x="410" y="185" class="chip">Web 前端（Vue 3 + Vite + Element Plus）</text>
  <text x="410" y="212" class="text">- Vue Router：页面路由与权限路由守卫</text>
  <text x="410" y="236" class="text">- Pinia：登录态/JWT 存储与角色判断</text>
  <text x="820" y="212" class="text">- Axios：统一请求与异常提示</text>
  <text x="820" y="236" class="text">- 页面：登录/注册、资产、拍卖、财务审核、处置、统计</text>

  <!-- 接口层内容 -->
  <rect x="380" y="320" width="860" height="110" rx="16" class="box"/>
  <text x="410" y="355" class="chip">REST API（Spring Boot Controller，统一返回体）</text>
  <text x="410" y="382" class="text">- 认证：登录/注册、JWT 签发与校验（Spring Security）</text>
  <text x="410" y="406" class="text">- 业务接口：/api/user、/api/department、/api/asset、/api/auction、/api/finance、/api/disposal、/api/statistics</text>

  <!-- 业务层内容 -->
  <rect x="380" y="490" width="860" height="150" rx="16" class="box"/>
  <text x="410" y="525" class="chip">Service 领域服务与规则引擎（核心状态迁移在服务层集中维护）</text>
  <text x="410" y="552" class="text">- 资产：折旧规则、定价评估、状态（待审核/待拍卖/待处置/已处置）</text>
  <text x="410" y="576" class="text">- 拍卖：出价/一键出价、撤价、结束结算、保留价判定</text>
  <text x="410" y="600" class="text">- 交易：生成交易单、确认时限（24h）、付款时限（48h）、超时处理</text>
  <text x="410" y="624" class="text">- 处置：收款审核（凭证）、处置确认（凭证）、归档锁定</text>
  <text x="980" y="576" class="text">- 统计：档案查询、处置统计、员工竞拍记录</text>

  <!-- 数据层内容 -->
  <rect x="380" y="700" width="860" height="130" rx="16" class="box"/>
  <text x="410" y="735" class="chip">持久化与存储</text>
  <text x="410" y="762" class="text">- MySQL：user、department、asset、depreciation_rule、auction、bid、transaction、disposal 等</text>
  <text x="410" y="786" class="text">- JPA Repository：业务数据持久化与分页查询</text>
  <text x="410" y="810" class="text">- 文件存储：uploads/（资产图片、付款凭证、处置凭证）</text>

  <!-- Arrows between layers -->
  <path d="M 700 262 L 700 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 700 432 L 700 470" class="line" marker-end="url(#arrow)"/>
  <path d="M 700 642 L 700 680" class="line" marker-end="url(#arrow)"/>
</svg>

