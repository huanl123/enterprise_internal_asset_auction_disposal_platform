<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#6B7280; }
      .text { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .h { font: 700 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .box { fill:#FFFFFF; stroke:#111827; stroke-width:2; }
      .panel { fill:#F8FAFC; stroke:#CBD5E1; stroke-width:2; }
      .chip { fill:#EEF2FF; stroke:#CBD5E1; stroke-width:2; }
      .muted { fill:#6B7280; }
      .line { stroke:#111827; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#FFFFFF"/>
  <text x="700" y="56" class="title" text-anchor="middle">拍卖详情与竞价页面截图（示意）</text>
  <text x="700" y="84" class="sub" text-anchor="middle">包含：当前价、剩余时间、出价操作、一键出价/自定义出价/撤价、竞价记录</text>

  <rect x="80" y="120" width="1240" height="640" rx="18" class="box"/>
  <rect x="80" y="120" width="1240" height="52" rx="18" class="panel"/>
  <rect x="200" y="134" width="860" height="24" rx="12" class="box"/>
  <text x="215" y="151" class="sub">http://localhost:5173/auction/详情</text>

  <!-- Header summary -->
  <rect x="110" y="190" width="1180" height="120" rx="14" class="panel"/>
  <text x="140" y="224" class="h">拍卖名称：示例拍卖活动</text>
  <text x="140" y="252" class="text">资产：示例资产（ASSET-…）</text>
  <rect x="940" y="210" width="320" height="80" rx="12" class="box"/>
  <text x="1100" y="240" class="sub" text-anchor="middle">剩余时间</text>
  <text x="1100" y="272" class="h" text-anchor="middle">01:23:45</text>

  <!-- Price + actions -->
  <rect x="110" y="330" width="580" height="200" rx="14" class="panel"/>
  <text x="140" y="364" class="h">参与竞拍</text>
  <text x="140" y="396" class="sub">当前最高价</text>
  <text x="140" y="430" class="h">￥ 1,720.00</text>
  <text x="360" y="396" class="sub">加价幅度</text>
  <text x="360" y="430" class="h">￥ 20.00</text>
  <rect x="140" y="460" width="160" height="44" rx="12" class="chip"/>
  <text x="220" y="488" class="text" text-anchor="middle">一键出价</text>
  <rect x="320" y="460" width="180" height="44" rx="12" class="chip"/>
  <text x="410" y="488" class="text" text-anchor="middle">自定义出价</text>
  <rect x="520" y="460" width="140" height="44" rx="12" class="chip"/>
  <text x="590" y="488" class="text" text-anchor="middle">撤价</text>
  <text x="140" y="518" class="sub">提示：最后 12 小时内出价不可撤回；最后 5 分钟出价自动延时 5 分钟</text>

  <!-- Images -->
  <rect x="710" y="330" width="580" height="200" rx="14" class="panel"/>
  <text x="740" y="364" class="h">资产图片</text>
  <rect x="740" y="386" width="150" height="120" rx="12" class="box"/>
  <rect x="910" y="386" width="150" height="120" rx="12" class="box"/>
  <rect x="1080" y="386" width="150" height="120" rx="12" class="box"/>
  <text x="815" y="454" class="sub" text-anchor="middle">图片</text>
  <text x="985" y="454" class="sub" text-anchor="middle">图片</text>
  <text x="1155" y="454" class="sub" text-anchor="middle">图片</text>

  <!-- Bids table -->
  <rect x="110" y="550" width="1180" height="190" rx="14" class="panel"/>
  <text x="140" y="584" class="h">出价记录</text>
  <rect x="140" y="602" width="1120" height="120" rx="12" class="box"/>
  <rect x="140" y="602" width="1120" height="38" rx="12" class="panel"/>
  <text x="160" y="627" class="sub">竞拍者</text>
  <text x="420" y="627" class="sub">出价（元）</text>
  <text x="640" y="627" class="sub">时间</text>
  <text x="980" y="627" class="sub">是否最高价</text>
  <line x1="140" y1="678" x2="1260" y2="678" class="line" opacity="0.25"/>
  <line x1="140" y1="716" x2="1260" y2="716" class="line" opacity="0.25"/>
  <text x="160" y="667" class="text muted">张三</text>
  <text x="420" y="667" class="text muted">1720.00</text>
  <text x="640" y="667" class="text muted">2026-03-13 20:10:00</text>
  <text x="980" y="667" class="text muted">是</text>
</svg>

