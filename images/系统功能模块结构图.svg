<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #6B7280; }
      .box { fill: #FFFFFF; stroke: #111827; stroke-width: 2; }
      .module { fill: #F8FAFC; stroke: #111827; stroke-width: 2; }
      .head { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 2; }
      .h { font: 700 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .t { font: 400 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="700" y="60" class="title" text-anchor="middle">系统功能模块结构图</text>
  <text x="700" y="88" class="sub" text-anchor="middle">用户、资产、拍卖、交易、处置、统计（基于本项目需求与菜单路由）</text>

  <!-- Root -->
  <rect x="520" y="130" width="360" height="70" rx="14" class="box"/>
  <text x="700" y="172" class="h" text-anchor="middle">企业废旧资产内部拍卖与处置平台</text>

  <!-- Connectors -->
  <path d="M 700 200 L 700 250" class="line"/>
  <path d="M 240 250 L 1160 250" class="line"/>
  <path d="M 240 250 L 240 300" class="line"/>
  <path d="M 472 250 L 472 300" class="line"/>
  <path d="M 700 250 L 700 300" class="line"/>
  <path d="M 928 250 L 928 300" class="line"/>
  <path d="M 1160 250 L 1160 300" class="line"/>

  <!-- Modules (6) -->
  <!-- 用户 -->
  <rect x="90" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="90" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="240" y="330" class="h" text-anchor="middle">用户与权限</text>
  <text x="110" y="372" class="t">- 普通员工注册/登录/退出</text>
  <text x="110" y="396" class="t">- 角色与账号管理（启用/禁用）</text>
  <text x="110" y="420" class="t">- 部门管理（管理员维护）</text>
  <text x="110" y="444" class="t">- JWT 鉴权与路由权限控制</text>

  <!-- 资产 -->
  <rect x="322" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="322" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="472" y="330" class="h" text-anchor="middle">资产管理</text>
  <text x="342" y="372" class="t">- 折旧规则：年限、残值率、停用</text>
  <text x="342" y="396" class="t">- 资产建档：编号、照片、部门、原值</text>
  <text x="342" y="420" class="t">- 定价评估：当前价值、建议起拍价</text>
  <text x="342" y="444" class="t">- 状态：待审核/待拍卖/待处置/已处置</text>

  <!-- 拍卖 -->
  <rect x="550" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="550" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="700" y="330" class="h" text-anchor="middle">拍卖管理</text>
  <text x="570" y="372" class="t">- 创建拍卖：时间、加价幅度、范围</text>
  <text x="570" y="396" class="t">- 竞价：一键出价/自定义出价</text>
  <text x="570" y="420" class="t">- 撤价：最高出价者且剩余时间 &gt; 12h</text>
  <text x="570" y="444" class="t">- 规则：最后5分钟出价自动延时5分钟</text>

  <!-- 交易 -->
  <rect x="778" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="778" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="928" y="330" class="h" text-anchor="middle">交易管理</text>
  <text x="798" y="372" class="t">- 拍卖结束：判定中标/流拍</text>
  <text x="798" y="396" class="t">- 生成交易单：唯一编号、成交信息</text>
  <text x="798" y="420" class="t">- 成交确认：24小时内确认</text>
  <text x="798" y="444" class="t">- 付款时限：确认后48小时内付款</text>

  <!-- 处置 -->
  <rect x="1010" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="1010" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="1160" y="330" class="h" text-anchor="middle">处置管理</text>
  <text x="1030" y="372" class="t">- 收款审核：财务确认收款+凭证</text>
  <text x="1030" y="396" class="t">- 审核不通过：取消交易、资产回待拍卖</text>
  <text x="1030" y="420" class="t">- 处置确认：资产专员上传处置凭证</text>
  <text x="1030" y="444" class="t">- 归档锁定：全生命周期记录固化</text>

  <!-- 统计（第二行居中） -->
  <path d="M 700 520 L 700 560" class="line"/>
  <rect x="440" y="560" width="520" height="230" rx="16" class="module"/>
  <rect x="440" y="560" width="520" height="46" rx="16" class="head"/>
  <text x="700" y="590" class="h" text-anchor="middle">统计查询</text>
  <text x="470" y="634" class="t">- 统计总览：处置数量、成交金额、流拍率</text>
  <text x="470" y="660" class="t">- 资产处置档案：按编号/名称查交易单、凭证、流转记录</text>
  <text x="470" y="686" class="t">- 资产处置统计：按部门/时间（月/季/年）汇总</text>
  <text x="470" y="712" class="t">- 员工竞拍记录：参与场次、中标、违约、明细</text>
  <text x="470" y="738" class="t">- 定时任务：拍卖结束、确认/付款超时自动处理</text>
</svg>

