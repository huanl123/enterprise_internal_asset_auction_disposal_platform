<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <style>
      .title { font-weight: bold; fill: #111; }
      .label { font-weight: bold; fill: #111; }
      .text  { font-weight: normal; fill: #111; }
      .muted { fill: #555; }
      .box { fill: #fff; stroke: #111; stroke-width: 1.6; }
      .usecase { fill: #fff; stroke: #111; stroke-width: 1.6; }
      .line { stroke: #111; stroke-width: 1.2; fill: none; }
      .dash { stroke-dasharray: 6 4; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111"/>
    </marker>
    <marker id="tri" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,6 L0,12 Z" fill="#fff" stroke="#111" stroke-width="1.6"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#fff"/>
  <text x="600" y="46" class="title" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">企业废旧资产内部拍卖与处置平台</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;"> </tspan><tspan font-size="10.5pt" font-family="SimSun">用例图</tspan></text>
  <text x="600" y="70" class="text muted" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">角色：系统管理员、资产专员、财务专员、普通员工</text>

  <!-- System boundary -->
  <rect x="220" y="100" width="760" height="560" class="box"/>
  <text x="600" y="126" class="label" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">系统（企业内部资产拍卖与处置平台）</text>

  <!-- Use cases (stacked like论文示例) -->
  <!-- Column A (common/employee) -->
  <ellipse cx="420" cy="165" rx="150" ry="30" class="usecase"/>
  <text x="420" y="169" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">注册</text>

  <ellipse cx="420" cy="225" rx="150" ry="30" class="usecase"/>
  <text x="420" y="229" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">登录</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">退出</tspan></text>

  <ellipse cx="420" cy="285" rx="150" ry="30" class="usecase"/>
  <text x="420" y="289" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">浏览资产与拍卖信息</text>

  <ellipse cx="420" cy="345" rx="150" ry="30" class="usecase"/>
  <text x="420" y="349" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">参与竞拍（出价</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">一键出价）</tspan></text>

  <ellipse cx="420" cy="405" rx="150" ry="30" class="usecase"/>
  <text x="420" y="409" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">成交确认（</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">24</tspan><tspan font-size="10.5pt" font-family="SimSun">小时内）</tspan></text>

  <ellipse cx="420" cy="465" rx="150" ry="30" class="usecase"/>
  <text x="420" y="469" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">查看竞拍记录</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">违约状态</tspan></text>

  <ellipse cx="420" cy="525" rx="150" ry="30" class="usecase"/>
  <text x="420" y="529" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">撤价（最高价撤回）</text>
  <text x="420" y="555" class="text muted" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">仅最高出价者；且剩余时间</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;"> &gt; 12 </tspan><tspan font-size="10.5pt" font-family="SimSun">小时</tspan></text>

  <!-- Column B (asset/finance/admin) -->
  <ellipse cx="780" cy="170" rx="165" ry="30" class="usecase"/>
  <text x="780" y="174" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">用户</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">角色</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">权限与部门管理</tspan></text>

  <ellipse cx="780" cy="245" rx="165" ry="30" class="usecase"/>
  <text x="780" y="249" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">折旧规则管理</text>

  <ellipse cx="780" cy="320" rx="165" ry="30" class="usecase"/>
  <text x="780" y="324" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">资产建档与维护（照片</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">部门）</tspan></text>

  <ellipse cx="780" cy="395" rx="165" ry="30" class="usecase"/>
  <text x="780" y="399" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">定价审核（起拍价</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">保留价）</tspan></text>

  <ellipse cx="780" cy="470" rx="165" ry="30" class="usecase"/>
  <text x="780" y="474" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">拍卖活动发布（时间</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">范围）</tspan></text>

  <ellipse cx="780" cy="545" rx="165" ry="30" class="usecase"/>
  <text x="780" y="549" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">确认收款（上传付款凭证）</text>

  <ellipse cx="780" cy="620" rx="165" ry="30" class="usecase"/>
  <text x="780" y="624" class="text" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">确认处置</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">归档与统计查询</tspan></text>

  <!-- extend: 撤价 extends 参与竞拍 -->
  <path d="M 330 510 C 240 480, 240 390, 330 365" class="line dash" marker-end="url(#arrow)"/>
  <text x="255" y="440" class="text muted" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="&quot;Times New Roman&quot;">&lt;&lt;extend&gt;&gt;</text>

  <!-- Actors -->
  <!-- 普通员工 (left) -->
  <g transform="translate(90,280)">
    <circle cx="0" cy="0" r="14" stroke="#111" stroke-width="1.6" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="56" class="line"/>
    <line x1="-22" y1="30" x2="22" y2="30" class="line"/>
    <line x1="0" y1="56" x2="-20" y2="86" class="line"/>
    <line x1="0" y1="56" x2="20" y2="86" class="line"/>
    <text x="0" y="112" class="label" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">普通员工</text>
  </g>

  <!-- 系统管理员 (right-top) -->
  <g transform="translate(1110,190)">
    <circle cx="0" cy="0" r="14" stroke="#111" stroke-width="1.6" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="56" class="line"/>
    <line x1="-22" y1="30" x2="22" y2="30" class="line"/>
    <line x1="0" y1="56" x2="-20" y2="86" class="line"/>
    <line x1="0" y1="56" x2="20" y2="86" class="line"/>
    <text x="0" y="112" class="label" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">系统管理员</text>
  </g>

  <!-- 资产专员 (right-middle) -->
  <g transform="translate(1110,365)">
    <circle cx="0" cy="0" r="14" stroke="#111" stroke-width="1.6" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="56" class="line"/>
    <line x1="-22" y1="30" x2="22" y2="30" class="line"/>
    <line x1="0" y1="56" x2="-20" y2="86" class="line"/>
    <line x1="0" y1="56" x2="20" y2="86" class="line"/>
    <text x="0" y="112" class="label" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">资产专员</text>
  </g>

  <!-- 财务专员 (right-bottom) -->
  <g transform="translate(1110,540)">
    <circle cx="0" cy="0" r="14" stroke="#111" stroke-width="1.6" fill="none"/>
    <line x1="0" y1="14" x2="0" y2="56" class="line"/>
    <line x1="-22" y1="30" x2="22" y2="30" class="line"/>
    <line x1="0" y1="56" x2="-20" y2="86" class="line"/>
    <line x1="0" y1="56" x2="20" y2="86" class="line"/>
    <text x="0" y="112" class="label" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">财务专员</text>
  </g>

  <!-- Associations (directed like示例图) -->
  <!-- 普通员工 -->
  <path d="M 112 280 L 270 165" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 295 L 270 225" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 310 L 270 285" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 325 L 270 345" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 340 L 270 405" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 355 L 270 465" class="line" marker-end="url(#arrow)"/>
  <path d="M 112 370 L 270 525" class="line" marker-end="url(#arrow)"/>

  <!-- 资产专员 -->
  <path d="M 1088 365 L 945 245" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 380 L 945 320" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 395 L 945 470" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 410 L 945 620" class="line" marker-end="url(#arrow)"/>

  <!-- 财务专员 -->
  <path d="M 1088 540 L 945 395" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 555 L 945 545" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 570 L 945 620" class="line" marker-end="url(#arrow)"/>

  <!-- 系统管理员 -->
  <path d="M 1088 190 L 945 170" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 205 L 270 225" class="line" marker-end="url(#arrow)"/>
  <path d="M 1088 220 L 945 620" class="line" marker-end="url(#arrow)"/>

  <!-- Role generalization: 系统管理员拥有资产专员/财务专员权限 -->
  <path d="M 1138 270 L 1165 270 L 1165 365 L 1138 365" class="line" marker-end="url(#tri)"/>
  <path d="M 1138 270 L 1165 270 L 1165 540 L 1138 540" class="line" marker-end="url(#tri)"/>
  <text x="1165" y="256" class="text muted" text-anchor="end" xml:space="preserve" font-size="10.5pt" font-family="SimSun">权限继承（泛化）</text>

  <text x="600" y="698" class="text muted" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="SimSun">注：用例名称与权限边界按项目需求（毕设需求</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">.txt</tspan><tspan font-size="10.5pt" font-family="SimSun">）抽取，可继续细化</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">“</tspan><tspan font-size="10.5pt" font-family="SimSun">交易单审核</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">流拍</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">违约处罚</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">”</tspan><tspan font-size="10.5pt" font-family="SimSun">等分支。</tspan></text>
</svg>