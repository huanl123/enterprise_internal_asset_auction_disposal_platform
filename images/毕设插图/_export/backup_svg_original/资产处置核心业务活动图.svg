<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font-weight: 700; fill: #111827; }
      .label { font-weight: 700; fill: #111827; }
      .text  { font-weight: 400; fill: #111827; }
      .muted { fill: #6B7280; }
      .lane { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.6; }
      .laneHeader { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 1.6; }
      .action { fill: #FFFFFF; stroke: #111827; stroke-width: 1.6; rx: 14; ry: 14; }
      .diamond { fill: #FFFFFF; stroke: #111827; stroke-width: 1.6; }
      .line { stroke: #111827; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="700" y="54" class="title" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">资产处置核心业务活动图</text>
  <text x="700" y="80" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">建档</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> → </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">审核</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> → </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">拍卖</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> → </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">确认</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> → </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">付款</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> → </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">归档</tspan></text>

  <!-- Swimlanes -->
  <rect x="120" y="120" width="1160" height="170" class="lane"/>
  <rect x="120" y="120" width="1160" height="44" class="laneHeader"/>
  <text x="140" y="148" class="label" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">资产专员</text>

  <rect x="120" y="290" width="1160" height="170" class="lane"/>
  <rect x="120" y="290" width="1160" height="44" class="laneHeader"/>
  <text x="140" y="318" class="label" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">财务专员（定价审核</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">收款确认）</tspan></text>

  <rect x="120" y="460" width="1160" height="170" class="lane"/>
  <rect x="120" y="460" width="1160" height="44" class="laneHeader"/>
  <text x="140" y="488" class="label" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">普通员工（竞买人）</text>

  <rect x="120" y="630" width="1160" height="170" class="lane"/>
  <rect x="120" y="630" width="1160" height="44" class="laneHeader"/>
  <text x="140" y="658" class="label" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">系统（自动处理）</text>

  <!-- Start/End -->
  <circle cx="180" cy="218" r="14" fill="#111827"/>
  <text x="180" y="250" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">开始</text>

  <circle cx="1330" cy="728" r="16" fill="none" stroke="#111827" stroke-width="1.6"/>
  <circle cx="1330" cy="728" r="9" fill="#111827"/>
  <text x="1330" y="760" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">结束</text>

  <!-- Actions (6-step trunk) -->
  <!-- 建档 -->
  <rect x="220" y="185" width="200" height="66" class="action"/>
  <text x="320" y="212" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">建档</text>
  <text x="320" y="234" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">录入资产</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">照片</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">部门</tspan></text>

  <!-- 审核 -->
  <rect x="460" y="355" width="200" height="66" class="action"/>
  <text x="560" y="382" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">审核</text>
  <text x="560" y="404" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">起拍价</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">保留价审批</tspan></text>

  <!-- Decision: 审核通过? -->
  <polygon points="690,388 730,348 770,388 730,428" class="diamond"/>
  <text x="730" y="392" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">通过？</text>

  <!-- 拍卖 -->
  <rect x="700" y="185" width="200" height="66" class="action"/>
  <text x="800" y="212" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">拍卖</text>
  <text x="800" y="234" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">发布拍卖</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">组织竞价</tspan></text>
  <text x="860" y="272" class="text muted" text-anchor="start" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">规则：最后</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">5</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">分钟出价自动延时；结束前</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">12</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">小时外可撤价</tspan></text>

  <!-- 确认 -->
  <rect x="700" y="525" width="200" height="66" class="action"/>
  <text x="800" y="552" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">确认</text>
  <text x="800" y="574" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">中标者确认成交</text>

  <!-- 付款 -->
  <rect x="940" y="355" width="200" height="66" class="action"/>
  <text x="1040" y="382" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">付款</text>
  <text x="1040" y="404" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">确认收款</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">上传凭证</tspan></text>

  <!-- 归档 -->
  <rect x="1120" y="695" width="200" height="66" class="action"/>
  <text x="1220" y="722" class="text" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">归档</text>
  <text x="1220" y="744" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">锁定全流程档案</text>

  <!-- System auto notes -->
  <text x="260" y="688" class="text muted" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">系统自动：折旧定价评估、建议起拍价生成、状态流转</text>
  <text x="260" y="712" class="text muted" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">系统自动：拍卖倒计时、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">5</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">分钟内出价自动延时、结果生成</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">交易单生成</tspan></text>

  <!-- Flow arrows -->
  <!-- Start -> 建档 -->
  <path d="M 194 218 L 220 218" class="line" marker-end="url(#arrow)"/>

  <!-- 建档 -> 审核 -->
  <path d="M 420 218 L 560 218 L 560 355" class="line" marker-end="url(#arrow)"/>

  <!-- 审核 -> decision -->
  <path d="M 660 388 L 690 388" class="line" marker-end="url(#arrow)"/>

  <!-- decision yes -> 拍卖 -->
  <path d="M 730 348 L 800 251" class="line" marker-end="url(#arrow)"/>
  <text x="790" y="332" class="text muted" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">是</text>

  <!-- decision no -> 返回建档 -->
  <path d="M 690 388 L 320 388 L 320 251" class="line" marker-end="url(#arrow)"/>
  <text x="500" y="368" class="text muted" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">否（补充</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">修改资料）</tspan></text>

  <!-- 拍卖 -> 确认 -->
  <path d="M 800 251 L 800 525" class="line" marker-end="url(#arrow)"/>

  <!-- 确认 -> 付款 -->
  <path d="M 900 558 L 940 388" class="line" marker-end="url(#arrow)"/>

  <!-- 付款 -> 归档 -->
  <path d="M 1140 388 L 1220 388 L 1220 695" class="line" marker-end="url(#arrow)"/>

  <!-- 归档 -> 结束 -->
  <path d="M 1320 728 L 1330 728" class="line" marker-end="url(#arrow)"/>

  <!-- Hints -->
  <text x="800" y="616" class="text muted" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">提示：同一资产限一人中标；逾期未确认</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">付款触发违约处罚与重新拍卖。</tspan></text>
</svg>