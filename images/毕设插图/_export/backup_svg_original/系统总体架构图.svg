<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font-weight: 700; fill: #111827; }
      .sub { font-weight: 400; fill: #6B7280; }
      .layerName { font-weight: 700; fill: #111827; }
      .text { font-weight: 400; fill: #111827; }
      .chip { font-weight: 600; fill: #111827; }
      .box { fill: #FFFFFF; stroke: #111827; stroke-width: 1.6; }
      .layer { fill: #F8FAFC; stroke: #CBD5E1; stroke-width: 1.6; }
      .accent { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 1.6; }
      .line { stroke: #111827; stroke-width: 1.6; fill: none; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="700" y="60" class="title" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">系统总体架构图</text>
  <text x="700" y="88" class="sub" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">表示层</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> / </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">接口层</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> / </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">业务层</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;"> / </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">数据层（基于本项目：</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Vue3 + Spring Boot + MySQL</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">）</tspan></text>

  <!-- Layers -->
  <rect x="140" y="130" width="1120" height="150" rx="18" class="layer"/>
  <rect x="140" y="300" width="1120" height="150" rx="18" class="layer"/>
  <rect x="140" y="470" width="1120" height="190" rx="18" class="layer"/>
  <rect x="140" y="680" width="1120" height="170" rx="18" class="layer"/>

  <!-- Layer titles -->
  <rect x="160" y="150" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="179" class="layerName" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">表示层</text>

  <rect x="160" y="320" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="349" class="layerName" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">接口层</text>

  <rect x="160" y="490" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="519" class="layerName" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">业务层</text>

  <rect x="160" y="700" width="180" height="44" rx="10" class="accent"/>
  <text x="250" y="729" class="layerName" text-anchor="middle" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">数据层</text>

  <!-- 表示层内容 -->
  <rect x="380" y="150" width="860" height="110" rx="16" class="box"/>
  <text x="410" y="185" class="chip" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Web </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">前端（</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Vue 3 + Vite + Element Plus</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">）</tspan></text>
  <text x="410" y="212" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- Vue Router</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">：页面路由与权限路由守卫</tspan></text>
  <text x="410" y="236" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- Pinia</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">：登录态</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/JWT </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">存储与角色判断</tspan></text>
  <text x="820" y="212" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- Axios</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">：统一请求与异常提示</tspan></text>
  <text x="820" y="236" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">页面：登录</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">注册、资产、拍卖、财务审核、处置、统计</tspan></text>

  <!-- 接口层内容 -->
  <rect x="380" y="320" width="860" height="110" rx="16" class="box"/>
  <text x="410" y="355" class="chip" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">REST API</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">（</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Spring Boot Controller</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">，统一返回体）</tspan></text>
  <text x="410" y="382" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">认证：登录</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">注册、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">JWT </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">签发与校验（</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Spring Security</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">）</tspan></text>
  <text x="410" y="406" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">业务接口：</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/user</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/department</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/asset</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/auction</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/finance</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/disposal</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/api/statistics</tspan></text>

  <!-- 业务层内容 -->
  <rect x="380" y="490" width="860" height="150" rx="16" class="box"/>
  <text x="410" y="525" class="chip" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">Service </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">领域服务与规则引擎（核心状态迁移在服务层集中维护）</tspan></text>
  <text x="410" y="552" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">资产：折旧规则、定价评估、状态（待审核</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">待拍卖</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">待处置</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">已处置）</tspan></text>
  <text x="410" y="576" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">拍卖：出价</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">一键出价、撤价、结束结算、保留价判定</tspan></text>
  <text x="410" y="600" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">交易：生成交易单、确认时限（</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">24h</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">）、付款时限（</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">48h</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">）、超时处理</tspan></text>
  <text x="410" y="624" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">处置：收款审核（凭证）、处置确认（凭证）、归档锁定</tspan></text>
  <text x="980" y="576" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">统计：档案查询、处置统计、员工竞拍记录</tspan></text>

  <!-- 数据层内容 -->
  <rect x="380" y="700" width="860" height="130" rx="16" class="box"/>
  <text x="410" y="735" class="chip" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">持久化与存储</text>
  <text x="410" y="762" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- MySQL</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">：</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">user</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">department</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">asset</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">depreciation_rule</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">auction</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">bid</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">transaction</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">、</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">disposal </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">等</tspan></text>
  <text x="410" y="786" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- JPA Repository</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">：业务数据持久化与分页查询</tspan></text>
  <text x="410" y="810" class="text" xml:space="preserve" style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;; font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;"><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">- </tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">文件存储：</tspan><tspan style="font-size: 10.5pt; font-family: &quot;Times New Roman&quot;;">uploads/</tspan><tspan style="font-size: 10.5pt; font-family: SimSun, &quot;宋体&quot;;">（资产图片、付款凭证、处置凭证）</tspan></text>

  <!-- Arrows between layers -->
  <path d="M 700 262 L 700 300" class="line" marker-end="url(#arrow)"/>
  <path d="M 700 432 L 700 470" class="line" marker-end="url(#arrow)"/>
  <path d="M 700 642 L 700 680" class="line" marker-end="url(#arrow)"/>
</svg>