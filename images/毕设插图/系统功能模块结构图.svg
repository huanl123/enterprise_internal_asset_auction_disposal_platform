<?xml version='1.0' encoding='UTF-8'?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900">
  <defs>
    <style>
      .title { font-weight: bold; fill: #111827; }
      .sub { font-weight: normal; fill: #6B7280; }
      .box { fill: #FFFFFF; stroke: #111827; stroke-width: 1.6; }
      .module { fill: #F8FAFC; stroke: #111827; stroke-width: 1.6; }
      .head { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 0.8; }
      .h { font-weight: bold; fill: #111827; }
      .t { font-weight: normal; fill: #111827; }
      .line { stroke: #111827; stroke-width: 1.2; fill: none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="900" fill="#FFFFFF"/>
  <text x="700" y="60" class="title" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">系统功能模块结构图</text>
  <text x="700" y="88" class="sub" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">用户、资产、拍卖、交易、处置、统计（基于本项目需求与菜单路由）</text>

  <!-- Root -->
  <rect x="520" y="130" width="360" height="70" rx="14" class="box"/>
  <text x="700" y="172" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">企业废旧资产内部拍卖与处置平台</text>

  <!-- Connectors -->
  <path d="M 700 200 L 700 250" class="line"/>
  <path d="M 240 250 L 1160 250" class="line"/>
  <path d="M 240 250 L 240 300" class="line"/>
  <path d="M 472 250 L 472 300" class="line"/>
  <path d="M 700 250 L 700 300" class="line"/>
  <path d="M 928 250 L 928 300" class="line"/>
  <path d="M 1160 250 L 1160 300" class="line"/>

  <!-- Modules (6) -->
  <!-- 用户 -->
  <rect x="90" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="90" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="240" y="330" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">用户与权限</text>
  <text x="110" y="372" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">普通员工注册</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">登录</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">退出</tspan></text>
  <text x="110" y="396" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">角色与账号管理（启用</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">禁用）</tspan></text>
  <text x="110" y="420" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">部门管理（管理员维护）</tspan></text>
  <text x="110" y="444" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- JWT </tspan><tspan font-size="10.5pt" font-family="SimSun">鉴权与路由权限控制</tspan></text>

  <!-- 资产 -->
  <rect x="322" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="322" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="472" y="330" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">资产管理</text>
  <text x="342" y="372" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">折旧规则：年限、残值率、停用</tspan></text>
  <text x="342" y="396" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">资产建档：编号、照片、部门、原值</tspan></text>
  <text x="342" y="420" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">定价评估：当前价值、建议起拍价</tspan></text>
  <text x="342" y="444" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">状态：待审核</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">待拍卖</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">待处置</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">已处置</tspan></text>

  <!-- 拍卖 -->
  <rect x="550" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="550" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="700" y="330" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">拍卖管理</text>
  <text x="570" y="372" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">创建拍卖：时间、加价幅度、范围</tspan></text>
  <text x="570" y="396" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">竞价：一键出价</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">自定义出价</tspan></text>
  <text x="570" y="420" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">撤价：最高出价者且剩余时间</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;"> &gt; 12h</tspan></text>
  <text x="570" y="444" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">规则：最后</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">5</tspan><tspan font-size="10.5pt" font-family="SimSun">分钟出价自动延时</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">5</tspan><tspan font-size="10.5pt" font-family="SimSun">分钟</tspan></text>

  <!-- 交易 -->
  <rect x="778" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="778" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="928" y="330" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">交易管理</text>
  <text x="798" y="372" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">拍卖结束：判定中标</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">流拍</tspan></text>
  <text x="798" y="396" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">生成交易单：唯一编号、成交信息</tspan></text>
  <text x="798" y="420" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">成交确认：</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">24</tspan><tspan font-size="10.5pt" font-family="SimSun">小时内确认</tspan></text>
  <text x="798" y="444" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">付款时限：确认后</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">48</tspan><tspan font-size="10.5pt" font-family="SimSun">小时内付款</tspan></text>

  <!-- 处置 -->
  <rect x="1010" y="300" width="300" height="210" rx="16" class="module"/>
  <rect x="1010" y="300" width="300" height="46" rx="16" class="head"/>
  <text x="1160" y="330" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">处置管理</text>
  <text x="1030" y="372" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">收款审核：财务确认收款</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">+</tspan><tspan font-size="10.5pt" font-family="SimSun">凭证</tspan></text>
  <text x="1030" y="396" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">审核不通过：取消交易、资产回待拍卖</tspan></text>
  <text x="1030" y="420" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">处置确认：资产专员上传处置凭证</tspan></text>
  <text x="1030" y="444" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">归档锁定：全生命周期记录固化</tspan></text>

  <!-- 统计（第二行居中） -->
  <path d="M 700 520 L 700 560" class="line"/>
  <rect x="440" y="560" width="520" height="230" rx="16" class="module"/>
  <rect x="440" y="560" width="520" height="46" rx="16" class="head"/>
  <text x="700" y="590" class="h" text-anchor="middle" xml:space="preserve" font-size="10.5pt" font-family="SimSun">统计查询</text>
  <text x="470" y="634" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">统计总览：处置数量、成交金额、流拍率</tspan></text>
  <text x="470" y="660" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">资产处置档案：按编号</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">名称查交易单、凭证、流转记录</tspan></text>
  <text x="470" y="686" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">资产处置统计：按部门</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">时间（月</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">季</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">年）汇总</tspan></text>
  <text x="470" y="712" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">员工竞拍记录：参与场次、中标、违约、明细</tspan></text>
  <text x="470" y="738" class="t" xml:space="preserve" font-size="10.5pt" font-family="SimSun"><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">- </tspan><tspan font-size="10.5pt" font-family="SimSun">定时任务：拍卖结束、确认</tspan><tspan font-size="10.5pt" font-family="&quot;Times New Roman&quot;">/</tspan><tspan font-size="10.5pt" font-family="SimSun">付款超时自动处理</tspan></text>
</svg>