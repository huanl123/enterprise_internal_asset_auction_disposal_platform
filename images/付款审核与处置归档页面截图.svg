<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#6B7280; }
      .text { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .h { font: 700 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .box { fill:#FFFFFF; stroke:#111827; stroke-width:2; }
      .panel { fill:#F8FAFC; stroke:#CBD5E1; stroke-width:2; }
      .chip { fill:#EEF2FF; stroke:#CBD5E1; stroke-width:2; }
      .muted { fill:#6B7280; }
      .line { stroke:#111827; stroke-width:2; fill:none; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#FFFFFF"/>
  <text x="700" y="56" class="title" text-anchor="middle">付款审核与处置归档页面截图（示意）</text>
  <text x="700" y="84" class="sub" text-anchor="middle">包含：交易单列表、收款确认（凭证上传）、处置确认（凭证上传）、归档结果</text>

  <rect x="80" y="120" width="1240" height="640" rx="18" class="box"/>
  <rect x="80" y="120" width="1240" height="52" rx="18" class="panel"/>
  <rect x="200" y="134" width="860" height="24" rx="12" class="box"/>
  <text x="215" y="151" class="sub">http://localhost:5173/finance 或 /disposal</text>

  <!-- Left: finance review list -->
  <rect x="110" y="190" width="580" height="570" rx="14" class="panel"/>
  <text x="140" y="224" class="h">财务审核（交易单）</text>
  <rect x="140" y="245" width="520" height="44" rx="12" class="box"/>
  <text x="155" y="273" class="sub">筛选：交易单号 / 确认状态 / 付款状态</text>
  <rect x="140" y="305" width="520" height="260" rx="12" class="box"/>
  <rect x="140" y="305" width="520" height="38" rx="12" class="panel"/>
  <text x="160" y="330" class="sub">交易单号</text>
  <text x="340" y="330" class="sub">确认状态</text>
  <text x="470" y="330" class="sub">付款状态</text>
  <line x1="140" y1="388" x2="660" y2="388" class="line" opacity="0.25"/>
  <line x1="140" y1="426" x2="660" y2="426" class="line" opacity="0.25"/>
  <text x="160" y="372" class="text muted">TXN…</text>
  <text x="340" y="372" class="text muted">confirmed</text>
  <text x="470" y="372" class="text muted">pending</text>
  <rect x="140" y="585" width="240" height="44" rx="12" class="chip"/>
  <text x="260" y="613" class="text" text-anchor="middle">确认收款</text>
  <rect x="420" y="585" width="240" height="44" rx="12" class="chip"/>
  <text x="540" y="613" class="text" text-anchor="middle">上传付款凭证</text>

  <!-- Right: disposal confirm -->
  <rect x="710" y="190" width="580" height="570" rx="14" class="panel"/>
  <text x="740" y="224" class="h">资产处置与归档</text>
  <rect x="740" y="245" width="520" height="120" rx="12" class="box"/>
  <text x="760" y="275" class="sub">处置单详情：资产编号/名称/中标者/成交金额</text>
  <text x="760" y="300" class="sub">状态：待处置 → 已处置（归档锁定）</text>
  <text x="760" y="325" class="sub">凭证：处置凭证（签收单/交割证明等）</text>
  <rect x="740" y="385" width="520" height="170" rx="12" class="box"/>
  <text x="760" y="415" class="sub">处置凭证上传区域（拖拽/点击上传）</text>
  <rect x="760" y="435" width="160" height="90" rx="12" class="panel"/>
  <rect x="940" y="435" width="160" height="90" rx="12" class="panel"/>
  <rect x="1120" y="435" width="120" height="90" rx="12" class="panel"/>
  <text x="840" y="488" class="sub" text-anchor="middle">凭证</text>
  <text x="1020" y="488" class="sub" text-anchor="middle">凭证</text>
  <text x="1180" y="488" class="sub" text-anchor="middle">…</text>
  <rect x="740" y="575" width="260" height="44" rx="12" class="chip"/>
  <text x="870" y="603" class="text" text-anchor="middle">确认处置</text>
  <rect x="1000" y="575" width="260" height="44" rx="12" class="chip"/>
  <text x="1130" y="603" class="text" text-anchor="middle">归档结果</text>
  <rect x="740" y="640" width="520" height="90" rx="12" class="box"/>
  <text x="760" y="670" class="sub">归档说明：锁定全生命周期记录（交易单、审核凭证、处置凭证、操作人）</text>
</svg>

