<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <style>
      .title { font: 700 30px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #6B7280; }
      .tbl { fill: #FFFFFF; stroke: #111827; stroke-width: 2; }
      .hdr { fill: #EEF2FF; stroke: #CBD5E1; stroke-width: 2; }
      .name { font: 700 16px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .field { font: 400 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
      .muted { fill: #6B7280; }
      .line { stroke: #111827; stroke-width: 2; fill: none; }
      .card { font: 600 12px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill: #111827; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="#111827" />
    </marker>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#FFFFFF"/>
  <text x="800" y="62" class="title" text-anchor="middle">数据库 E-R 图</text>
  <text x="800" y="90" class="sub" text-anchor="middle">基于 waidp_springboot_master.sql（核心实体与外键关系）</text>

  <!-- Helper: table box template is: outer rect + header rect + fields -->

  <!-- department -->
  <rect x="70" y="170" width="300" height="170" rx="12" class="tbl"/>
  <rect x="70" y="170" width="300" height="44" rx="12" class="hdr"/>
  <text x="220" y="199" class="name" text-anchor="middle">department（部门）</text>
  <text x="90" y="235" class="field">PK id</text>
  <text x="90" y="260" class="field">name</text>
  <text x="90" y="285" class="field">leader</text>
  <text x="90" y="310" class="field muted">create_time / update_time</text>

  <!-- user -->
  <rect x="70" y="410" width="300" height="240" rx="12" class="tbl"/>
  <rect x="70" y="410" width="300" height="44" rx="12" class="hdr"/>
  <text x="220" y="439" class="name" text-anchor="middle">user（用户）</text>
  <text x="90" y="475" class="field">PK id</text>
  <text x="90" y="500" class="field">username / password</text>
  <text x="90" y="525" class="field">name / phone</text>
  <text x="90" y="550" class="field">role / status</text>
  <text x="90" y="575" class="field">FK department_id → department.id</text>
  <text x="90" y="600" class="field muted">bid_ban_until</text>
  <text x="90" y="625" class="field muted">create_time / update_time</text>

  <!-- depreciation_rule -->
  <rect x="70" y="710" width="300" height="200" rx="12" class="tbl"/>
  <rect x="70" y="710" width="300" height="44" rx="12" class="hdr"/>
  <text x="220" y="739" class="name" text-anchor="middle">depreciation_rule（折旧规则）</text>
  <text x="90" y="775" class="field">PK id</text>
  <text x="90" y="800" class="field">name</text>
  <text x="90" y="825" class="field">useful_life / salvage_rate</text>
  <text x="90" y="850" class="field muted">description / status</text>
  <text x="90" y="875" class="field muted">create_time / update_time</text>

  <!-- asset -->
  <rect x="520" y="220" width="360" height="290" rx="12" class="tbl"/>
  <rect x="520" y="220" width="360" height="44" rx="12" class="hdr"/>
  <text x="700" y="249" class="name" text-anchor="middle">asset（资产）</text>
  <text x="540" y="285" class="field">PK id</text>
  <text x="540" y="310" class="field">code（唯一） / name / category</text>
  <text x="540" y="335" class="field muted">specification / images</text>
  <text x="540" y="360" class="field">FK department_id → department.id</text>
  <text x="540" y="385" class="field">FK depreciation_rule_id → depreciation_rule.id</text>
  <text x="540" y="410" class="field">original_value / current_value</text>
  <text x="540" y="435" class="field muted">start_price / reserve_price / has_reserve_price</text>
  <text x="540" y="460" class="field">status</text>
  <text x="540" y="485" class="field muted">create_time / update_time</text>

  <!-- auction -->
  <rect x="980" y="220" width="360" height="260" rx="12" class="tbl"/>
  <rect x="980" y="220" width="360" height="44" rx="12" class="hdr"/>
  <text x="1160" y="249" class="name" text-anchor="middle">auction（拍卖）</text>
  <text x="1000" y="285" class="field">PK id</text>
  <text x="1000" y="310" class="field">FK asset_id → asset.id</text>
  <text x="1000" y="335" class="field muted">name / description / department_ids</text>
  <text x="1000" y="360" class="field">start_time / end_time</text>
  <text x="1000" y="385" class="field">increment_amount</text>
  <text x="1000" y="410" class="field muted">current_price / final_price</text>
  <text x="1000" y="435" class="field">FK winner_id → user.id（可空）</text>
  <text x="1000" y="460" class="field">status</text>

  <!-- bid -->
  <rect x="980" y="520" width="360" height="200" rx="12" class="tbl"/>
  <rect x="980" y="520" width="360" height="44" rx="12" class="hdr"/>
  <text x="1160" y="549" class="name" text-anchor="middle">bid（出价记录）</text>
  <text x="1000" y="585" class="field">PK id</text>
  <text x="1000" y="610" class="field">FK auction_id → auction.id</text>
  <text x="1000" y="635" class="field">FK bidder_id → user.id</text>
  <text x="1000" y="660" class="field">price / bid_time / is_highest</text>

  <!-- transaction -->
  <rect x="520" y="560" width="360" height="260" rx="12" class="tbl"/>
  <rect x="520" y="560" width="360" height="44" rx="12" class="hdr"/>
  <text x="700" y="589" class="name" text-anchor="middle">transaction（交易单）</text>
  <text x="540" y="625" class="field">PK id / code（唯一）</text>
  <text x="540" y="650" class="field">FK auction_id → auction.id</text>
  <text x="540" y="675" class="field">FK asset_id → asset.id</text>
  <text x="540" y="700" class="field">FK winner_id → user.id</text>
  <text x="540" y="725" class="field">final_price</text>
  <text x="540" y="750" class="field">confirm_status / confirm_deadline / confirm_time</text>
  <text x="540" y="775" class="field">payment_status / payment_deadline</text>
  <text x="540" y="800" class="field muted">disposal_status / vouchers / remark</text>

  <!-- disposal -->
  <rect x="980" y="760" width="360" height="180" rx="12" class="tbl"/>
  <rect x="980" y="760" width="360" height="44" rx="12" class="hdr"/>
  <text x="1160" y="789" class="name" text-anchor="middle">disposal（处置记录）</text>
  <text x="1000" y="825" class="field">PK id</text>
  <text x="1000" y="850" class="field">FK asset_id → asset.id</text>
  <text x="1000" y="875" class="field muted">voucher_urls / remark / time</text>

  <!-- asset_history -->
  <rect x="520" y="840" width="360" height="120" rx="12" class="tbl"/>
  <rect x="520" y="840" width="360" height="44" rx="12" class="hdr"/>
  <text x="700" y="869" class="name" text-anchor="middle">asset_history（资产流水）</text>
  <text x="540" y="905" class="field">PK id</text>
  <text x="540" y="930" class="field">FK asset_id → asset.id；FK operator_id → user.id</text>

  <!-- Relationships (simple 1..N labels) -->
  <!-- department 1 - N user -->
  <path d="M 370 520 L 470 520 L 470 540 L 520 540" class="line" marker-end="url(#arrow)"/>
  <text x="420" y="508" class="card">1</text>
  <text x="490" y="532" class="card">N</text>

  <!-- department 1 - N asset -->
  <path d="M 370 260 L 520 360" class="line" marker-end="url(#arrow)"/>
  <text x="410" y="250" class="card">1</text>
  <text x="500" y="352" class="card">N</text>

  <!-- depreciation_rule 1 - N asset -->
  <path d="M 370 810 L 460 810 L 460 385 L 520 385" class="line" marker-end="url(#arrow)"/>
  <text x="400" y="798" class="card">1</text>
  <text x="500" y="378" class="card">N</text>

  <!-- asset 1 - N auction -->
  <path d="M 880 330 L 980 330" class="line" marker-end="url(#arrow)"/>
  <text x="900" y="318" class="card">1</text>
  <text x="958" y="318" class="card">N</text>

  <!-- auction 1 - N bid -->
  <path d="M 1160 480 L 1160 520" class="line" marker-end="url(#arrow)"/>
  <text x="1146" y="506" class="card">1</text>
  <text x="1168" y="506" class="card">N</text>

  <!-- user 1 - N bid -->
  <path d="M 370 560 L 840 560 L 840 635 L 980 635" class="line" marker-end="url(#arrow)"/>
  <text x="420" y="548" class="card">1</text>
  <text x="960" y="628" class="card">N</text>

  <!-- user 1 - N auction(winner) -->
  <path d="M 370 500 L 940 500 L 940 445 L 980 445" class="line" marker-end="url(#arrow)"/>
  <text x="420" y="488" class="card">1</text>
  <text x="960" y="438" class="card">N</text>

  <!-- auction 1 - 0..1 transaction -->
  <path d="M 980 390 L 880 390 L 880 650 L 880 650 L 880 650" class="line"/>
  <path d="M 880 650 L 880 650 L 880 650" class="line"/>
  <path d="M 980 390 L 900 390 L 900 650 L 880 650" class="line" marker-end="url(#arrow)"/>
  <text x="940" y="378" class="card">1</text>
  <text x="890" y="642" class="card">0..1</text>

  <!-- asset 1 - N transaction -->
  <path d="M 700 510 L 700 560" class="line" marker-end="url(#arrow)"/>
  <text x="684" y="540" class="card">1</text>
  <text x="712" y="540" class="card">N</text>

  <!-- user 1 - N transaction (winner) -->
  <path d="M 370 600 L 470 600 L 470 700 L 520 700" class="line" marker-end="url(#arrow)"/>
  <text x="400" y="588" class="card">1</text>
  <text x="500" y="692" class="card">N</text>

  <!-- asset 1 - 0..1 disposal -->
  <path d="M 880 460 L 940 460 L 940 850 L 980 850" class="line" marker-end="url(#arrow)"/>
  <text x="900" y="448" class="card">1</text>
  <text x="960" y="842" class="card">0..1</text>

  <!-- asset 1 - N asset_history -->
  <path d="M 650 510 L 650 840" class="line" marker-end="url(#arrow)"/>
  <text x="634" y="540" class="card">1</text>
  <text x="662" y="832" class="card">N</text>

  <!-- user 1 - N asset_history (operator) -->
  <path d="M 370 640 L 470 640 L 470 930 L 520 930" class="line" marker-end="url(#arrow)"/>
  <text x="400" y="628" class="card">1</text>
  <text x="500" y="922" class="card">N</text>
</svg>

