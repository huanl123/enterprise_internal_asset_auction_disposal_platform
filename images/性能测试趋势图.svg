<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820">
  <defs>
    <style>
      .title { font: 700 28px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .sub { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#6B7280; }
      .text { font: 400 14px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; fill:#111827; }
      .axis { stroke:#111827; stroke-width:2; }
      .grid { stroke:#CBD5E1; stroke-width:1.5; }
      .line { stroke:#111827; stroke-width:3; fill:none; }
      .pt { fill:#111827; }
      .note { fill:#6B7280; font: 400 13px "Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif; }
      .box { fill:#FFFFFF; stroke:#111827; stroke-width:2; rx:14; ry:14; }
    </style>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="#FFFFFF"/>
  <text x="700" y="56" class="title" text-anchor="middle">性能测试趋势图（示意）</text>
  <text x="700" y="84" class="sub" text-anchor="middle">并发用户数与响应时间关系曲线（用于论文占位，可替换为 JMeter 真实结果）</text>

  <rect x="120" y="140" width="1160" height="600" class="box"/>

  <!-- Chart area -->
  <line x1="220" y1="660" x2="1180" y2="660" class="axis"/>
  <line x1="220" y1="220" x2="220" y2="660" class="axis"/>

  <!-- Grid -->
  <line x1="220" y1="572" x2="1180" y2="572" class="grid"/>
  <line x1="220" y1="484" x2="1180" y2="484" class="grid"/>
  <line x1="220" y1="396" x2="1180" y2="396" class="grid"/>
  <line x1="220" y1="308" x2="1180" y2="308" class="grid"/>
  <line x1="340" y1="220" x2="340" y2="660" class="grid"/>
  <line x1="460" y1="220" x2="460" y2="660" class="grid"/>
  <line x1="580" y1="220" x2="580" y2="660" class="grid"/>
  <line x1="700" y1="220" x2="700" y2="660" class="grid"/>
  <line x1="820" y1="220" x2="820" y2="660" class="grid"/>
  <line x1="940" y1="220" x2="940" y2="660" class="grid"/>
  <line x1="1060" y1="220" x2="1060" y2="660" class="grid"/>
  <line x1="1180" y1="220" x2="1180" y2="660" class="grid"/>

  <!-- Labels -->
  <text x="700" y="710" class="text" text-anchor="middle">并发用户数（threads）</text>
  <text x="160" y="440" class="text" text-anchor="middle" transform="rotate(-90 160 440)">平均响应时间（ms）</text>

  <text x="220" y="684" class="note" text-anchor="middle">0</text>
  <text x="340" y="684" class="note" text-anchor="middle">20</text>
  <text x="460" y="684" class="note" text-anchor="middle">40</text>
  <text x="580" y="684" class="note" text-anchor="middle">60</text>
  <text x="700" y="684" class="note" text-anchor="middle">80</text>
  <text x="820" y="684" class="note" text-anchor="middle">100</text>
  <text x="940" y="684" class="note" text-anchor="middle">120</text>
  <text x="1060" y="684" class="note" text-anchor="middle">140</text>
  <text x="1180" y="684" class="note" text-anchor="middle">160</text>

  <text x="208" y="660" class="note" text-anchor="end">0</text>
  <text x="208" y="572" class="note" text-anchor="end">200</text>
  <text x="208" y="484" class="note" text-anchor="end">400</text>
  <text x="208" y="396" class="note" text-anchor="end">600</text>
  <text x="208" y="308" class="note" text-anchor="end">800</text>
  <text x="208" y="220" class="note" text-anchor="end">1000</text>

  <!-- Example curve (placeholder) -->
  <path d="M 220 640 L 340 610 L 460 575 L 580 545 L 700 520 L 820 500 L 940 490 L 1060 500 L 1180 540" class="line" opacity="0.8"/>
  <circle cx="220" cy="640" r="4" class="pt"/>
  <circle cx="340" cy="610" r="4" class="pt"/>
  <circle cx="460" cy="575" r="4" class="pt"/>
  <circle cx="580" cy="545" r="4" class="pt"/>
  <circle cx="700" cy="520" r="4" class="pt"/>
  <circle cx="820" cy="500" r="4" class="pt"/>
  <circle cx="940" cy="490" r="4" class="pt"/>
  <circle cx="1060" cy="500" r="4" class="pt"/>
  <circle cx="1180" cy="540" r="4" class="pt"/>

  <text x="240" y="180" class="sub">注：此图为模板曲线，替换时可按测试结果（平均/95分位）绘制多条曲线并加图例。</text>
</svg>

